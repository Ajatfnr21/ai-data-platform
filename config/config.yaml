# Ai Data Platform Configuration

app:
  name: "Ai Data Platform"
  version: "2.0.0"
  debug: false

features:
  - Feature store
  - Model registry
  - Auto-retraining

tech_stack:
  - MLflow
  - Feast
  - Spark
  - Triton

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(message)s"
